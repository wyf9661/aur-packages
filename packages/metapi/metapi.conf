# Metapi configuration
# Copy this file to /etc/metapi/env and edit to match your setup.

# Required: Admin panel login token
AUTH_TOKEN=change-me-admin-token

# Required: Proxy API token for downstream clients
PROXY_TOKEN=change-me-proxy-sk-token

# Optional: Server port (default: 5000)
# PORT=5000

# Optional: Listen host (default: 0.0.0.0)
# HOST=0.0.0.0

# Optional: Database type (sqlite, mysql, postgres)
# DB_TYPE=sqlite

# Optional: Database URL (leave empty for default SQLite path)
# DB_URL=

# Optional: Timezone
# TZ=Asia/Shanghai

# Optional: Check-in cron schedule (default: 0 8 * * *)
# CHECKIN_CRON=0 8 * * *

# Optional: Balance refresh cron (default: 0 * * * *)
# BALANCE_REFRESH_CRON=0 * * * *
