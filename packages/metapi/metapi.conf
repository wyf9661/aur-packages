# Metapi configuration
# Copy this file to /etc/metapi/env and edit to match your setup.
#
# AUR package runs with NODE_ENV=production. Required:
# - AUTH_TOKEN >= 8 chars, not the built-in default
# - ACCOUNT_CREDENTIAL_SECRET >= 8 chars, MUST differ from AUTH_TOKEN
#
# Downstream /v1/* access: create managed API keys in the UI.
# Global PROXY_TOKEN is disabled by default in production.

# Required: Admin panel login token (>=8 chars)
AUTH_TOKEN=change-me-admin-token

# Required: encrypts stored upstream account passwords (>=8 chars, != AUTH_TOKEN)
ACCOUNT_CREDENTIAL_SECRET=change-me-credential-secret

# Optional: only if you intentionally want one env-wide proxy token.
# Production default is OFF — prefer UI-generated managed keys.
# ALLOW_GLOBAL_PROXY_TOKEN=true
# PROXY_TOKEN=your-strong-global-proxy-token

# Optional: Server port (default: 5000)
# PORT=5000

# Optional: Listen host (default: 0.0.0.0)
# HOST=0.0.0.0

# Optional: Database type (sqlite, mysql, postgres)
# DB_TYPE=sqlite

# Optional: Database URL (leave empty for default SQLite path)
# DB_URL=

# Optional: Timezone
# TZ=Asia/Shanghai

# Optional: Check-in cron schedule (default: 0 8 * * *)
# CHECKIN_CRON=0 8 * * *

# Optional: Balance refresh cron (default: 0 * * * *)
# BALANCE_REFRESH_CRON=0 * * * *
